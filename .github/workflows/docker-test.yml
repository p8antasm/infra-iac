name: Docker Check
on: workflow_dispatch # Allows manual triggering

jobs:
  check-docker:
    runs-on: iac # Replace with your specific runner label if needed
    
    # Test 1: Can the runner run containerized steps?
    container:
      image: node:18-alpine

    steps:
      # Test 2: Can the runner execute Docker commands inside a script?
      - name: Check Docker Version
        run: |
          echo "Container is running successfully!"
          node -v

